# =========================================================
# SERVER (LOCAL ONLY)
# =========================================================
server.port=8082

# =========================================================
# DATABASE (LOCAL POSTGRES)
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sarathi
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (Lightweight for Dev)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=SarathiDevPool

# =========================================================
# JPA / HIBERNATE (DEV MODE)
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =========================================================
# REDIS (LOCAL)
# =========================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Seat Lock TTL
seat.lock.ttl.minutes=5

# =========================================================
# JWT (ENV DRIVEN)
# =========================================================
jwt.secret=${JWT_SECRET:dev-secret-key-32-characters-minimum}

# =========================================================
# RAZORPAY (TEST / MOCK)
# =========================================================
razorpay.key.id=${RAZORPAY_KEY_ID:test_key}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_secret}
app.payment.mock.enabled=${PAYMENT_MOCK_ENABLED:true}

# =========================================================
# OPTIONAL ADMIN BOOTSTRAP
# =========================================================
app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}

# =========================================================
# ACTUATOR (OPEN IN DEV)
# =========================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# =========================================================
# LOGGING (VERBOSE FOR DEV)
# =========================================================
logging.level.root=INFO
logging.level.com.busbooking=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
# =========================================================
# APPLICATION NAME
# =========================================================
spring.application.name=sarathi-bus-booking-system

# =========================================================
# JACKSON (GLOBAL)
# =========================================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

# =========================================================
# ACTUATOR (COMMON BASE)
# =========================================================
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when_authorized
management.health.redis.enabled=true
management.health.db.enabled=true

# =========================================================
# MICROMETER METRICS (BASE ENABLED)
# =========================================================
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# =========================================================
# REDIS (BASE)
# =========================================================
spring.data.redis.repositories.enabled=false
spring.cache.type=redis

# =========================================================
# HIKARI SAFE DEFAULTS (OVERRIDDEN PER PROFILE)
# =========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# =========================================================
# RESILIENCE4J (BASELINE)
# =========================================================
resilience4j.circuitbreaker.instances.razorpayService.register-health-indicator=true
resilience4j.circuitbreaker.instances.razorpayService.sliding-window-size=10
resilience4j.circuitbreaker.instances.razorpayService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.razorpayService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.razorpayService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.razorpayService.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.razorpayService.max-attempts=3
resilience4j.retry.instances.razorpayService.wait-duration=2s
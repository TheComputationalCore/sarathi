# =========================================================
# SERVER (RENDER COMPATIBLE)
# =========================================================
server.port=${PORT:8082}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# =========================================================
# DATABASE (NEON / ENV DRIVEN)
# =========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (Production Optimized)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=SarathiProdPool

# Critical for Neon (SSL enforcement)
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# Optional but recommended (connection validation)
spring.datasource.hikari.connection-test-query=SELECT 1

# =========================================================
# JPA (STRICT PRODUCTION MODE)
# =========================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =========================================================
# REDIS (RENDER / EXTERNAL)
# =========================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms
spring.cache.type=redis

# =========================================================
# JWT (ENV REQUIRED)
# =========================================================
jwt.secret=${JWT_SECRET}

# =========================================================
# RAZORPAY
# =========================================================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# =========================================================
# RESILIENCE4J (PRODUCTION HARDENED)
# =========================================================
resilience4j.circuitbreaker.instances.razorpayService.register-health-indicator=true
resilience4j.circuitbreaker.instances.razorpayService.sliding-window-size=20
resilience4j.circuitbreaker.instances.razorpayService.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.razorpayService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.razorpayService.wait-duration-in-open-state=30s

resilience4j.retry.instances.razorpayService.max-attempts=2
resilience4j.retry.instances.razorpayService.wait-duration=1s

# =========================================================
# ACTUATOR (ISOLATED + LOCKED)
# =========================================================
management.server.port=8083
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=sarathi-bus-booking-system

# =========================================================
# LOGGING (SAFE)
# =========================================================
logging.level.root=INFO
logging.level.com.busbooking=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework.web=INFO

# =========================================================
# METRICS (PROMETHEUS ENABLED)
# =========================================================
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.export.prometheus.enabled=true
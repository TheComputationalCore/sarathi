<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ===================================================== -->
  <!-- CORE DOCUMENT META -->
  <!-- ===================================================== -->

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light only" />
  <meta name="format-detection" content="telephone=no" />

  <title>Sarathi — Heritage Travel Network of Bharat</title>

  <meta name="description"
        content="Sarathi is Bharat's heritage travel network. Book sacred and cultural journeys with secure digital payments and seamless seat selection." />

  <meta name="keywords"
        content="Sarathi, Bus Booking, Yatra, Pilgrimage Travel, Heritage Travel, Bharat Travel Network" />

  <meta name="author" content="Sarathi" />
  <meta name="theme-color" content="#B45309" />
  <meta name="robots" content="index, follow" />

  <link rel="canonical" href="https://sarathi.app" />

  <!-- ===================================================== -->
  <!-- OPEN GRAPH (Facebook / LinkedIn / WhatsApp) -->
  <!-- ===================================================== -->

  <meta property="og:site_name" content="Sarathi" />
  <meta property="og:title" content="Sarathi — Heritage Travel Network of Bharat" />
  <meta property="og:description"
        content="Book sacred and cultural journeys with Sarathi. Secure, seamless, and beautifully designed travel platform." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sarathi.app" />
  <meta property="og:image" content="https://sarathi.app/logo512.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- ===================================================== -->
  <!-- TWITTER CARD -->
  <!-- ===================================================== -->

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sarathi — Heritage Travel Network of Bharat" />
  <meta name="twitter:description"
        content="Secure and seamless sacred travel booking across Bharat." />
  <meta name="twitter:image" content="https://sarathi.app/logo512.png" />

  <!-- ===================================================== -->
  <!-- PERFORMANCE OPTIMIZATION -->
  <!-- ===================================================== -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://checkout.razorpay.com" />

  <!-- ===================================================== -->
  <!-- PREMIUM TYPOGRAPHY (Optimized Loading) -->
  <!-- ===================================================== -->

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- ===================================================== -->
  <!-- FAVICONS -->
  <!-- ===================================================== -->

  <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/logo192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- ===================================================== -->
  <!-- STRUCTURED DATA (SEO BOOST) -->
  <!-- ===================================================== -->

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TravelAgency",
    "name": "Sarathi",
    "url": "https://sarathi.app",
    "logo": "https://sarathi.app/logo512.png",
    "description": "Heritage travel and pilgrimage booking network of Bharat.",
    "areaServed": {
      "@type": "Country",
      "name": "India"
    },
    "sameAs": [
      "https://twitter.com/",
      "https://www.instagram.com/"
    ]
  }
  </script>

  <!-- ===================================================== -->
  <!-- RAZORPAY (Loaded Once) -->
  <!-- ===================================================== -->

  <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

  <noscript>
    You need to enable JavaScript to run Sarathi.
  </noscript>

  <div id="root"></div>

</body>
</html>

version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: sarathi-postgres
    restart: always
    environment:
      POSTGRES_DB: sarathi
      POSTGRES_USER: sarathi
      POSTGRES_PASSWORD: sarathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sarathi-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: sarathi-backend
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/sarathi
      DB_USERNAME: sarathi
      DB_PASSWORD: sarathi
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-very-secure-32chars
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
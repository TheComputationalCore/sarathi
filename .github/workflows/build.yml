name: Build and Verify Sarathi

on:
push:
branches:
- main
- master
pull_request:
branches:
- main
- master

jobs:

backend-build:
name: Build Spring Boot Backend
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 21
      cache: maven

  - name: Build Backend
    run: mvn -B clean verify
```

frontend-build:
name: Build React Frontend
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm
      cache-dependency-path: frontend/package-lock.json

  - name: Install Dependencies
    run: |
      cd frontend
      npm install

  - name: Build Frontend
    run: |
      cd frontend
      npm run build
```
